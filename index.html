<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education Result Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
    <div class="container">
        <h1>Education Result Portal</h1>
        <p>Student Examination Result System</p>
    </div>
</header>

<section class="search-section">

<div class="search-box">

<h2>
  <h2>Search Your Result</h2>

<form action="result.html">

<label>Examination</label>
<select required>
<option>SSC</option>
<option>HSC</option>
</select>

<label>Year</label>
<select required>
<option>2025</option>
<option>2024</option>
</select>

<label>Board</label>
<select required>
<option>Dhaka</option>
<option>Chattogram</option>
<option>Rajshahi</option>
<option>Khulna</option>
<option>Sylhet</option>
<option>Barishal</option>
<option>Dinajpur</option>
<option>Mymensingh</option>
</select>

<label>Roll Number</label>
<input type="number" placeholder="Enter Roll Number" required>

<label>Registration Number</label>
<input type="number" placeholder="Enter Registration Number" required>

<button type="submit">Search Result</button>

</form>

</div>

</section>

<footer>
<p>© 2025 Education Result Portal. All Rights Reserved.</p>
</footer>

</body>
</html>
