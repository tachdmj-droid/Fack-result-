<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Result 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  body { font-family: Arial, sans-serif; background: #eee; padding: 20px; }
  .main-card { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
  input { width: 48%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; }
  button { background: #006633; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; }
  
  /* সরকারি ডিজাইন স্টাইল */
  #pdfArea { padding: 20px; border: 1px solid #ccc; display: none; }
  .header { background: #006633; color: white; padding: 15px; text-align: center; }
  .sub-header { background: #7cc576; color: white; text-align: center; padding: 5px; font-weight: bold; margin: 10px 0; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  td, th { border: 1px solid #ccc; padding: 8px; font-size: 14px; }
  .label { background: #f2f2f2; font-weight: bold; width: 25%; }
</style>
</head>
<body>

<div class="main-card">
  <h2>Result Generator 2026</h2>
  <input type="text" id="name" placeholder="Student Name" style="width: 98%;">
  <input type="text" id="roll" placeholder="Roll No">
  <input type="text" id="gpa" placeholder="GPA">
  
  <div id="subFields">
    <p><b>Subjects & Grades:</b></p>
    <input type="text" class="sn" value="Bengali"> <input type="text" class="sg" placeholder="Grade">
    <input type="text" class="sn" value="English"> <input type="text" class="sg" placeholder="Grade">
    <input type="text" class="sn" value="Mathematics"> <input type="text" class="sg" placeholder="Grade">
  </div>
  <button onclick="generate()">Generate & Download PDF</button>

  <div id="pdfArea">
    <div class="header"><h3>Ministry of Education</h3><p>Intermediate and Secondary Education Boards Bangladesh</p></div>
    <div class="sub-header">SSC/DAKHIL/EQUIVALENT RESULT 2026</div>
    <table>
      <tr><td class="label">Name</td><td id="pn"></td><td class="label">Roll</td><td id="pr"></td></tr>
      <tr><td class="label">GPA</td><td id="pg" colspan="3"></td></tr>
    </table>
    <table>
      <thead><tr style="background:#ddd;"><th>Subject</th><th>Grade</th></tr></thead>
      <tbody id="pt"></tbody>
    </table>
    <p style="font-size:10px; text-align:center; margin-top:20px;">©2005-2026 Ministry of Education. | Generated by Junied Hossain</p>
  </div>
</div>

<script>
function generate() {
  document.getElementById('pn').innerText = document.getElementById('name').value;
  document.getElementById('pr').innerText = document.getElementById('roll').value;
  document.getElementById('pg').innerText = document.getElementById('gpa').value;
  
  let tbody = document.getElementById('pt');
  tbody.innerHTML = "";
  let sn = document.getElementsByClassName('sn');
  let sg = document.getElementsByClassName('sg');
  
  for(let i=0; i<sn.length; i++) {
    if(sn[i].value) tbody.innerHTML += `<tr><td>${sn[i].value}</td><td>${sg[i].value}</td></tr>`;
  }
  
  document.getElementById('pdfArea').style.display = 'block';
  html2pdf().from(document.getElementById('pdfArea')).save('Official_Result_2026.pdf');
}
</script>
</body>
</html>
